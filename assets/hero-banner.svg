<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="PsychGeno — Privacy-First Psychiatric Genomics">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strandA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="strandB" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#glow)"/>
  <rect width="1200" height="360" fill="url(#glow2)"/>

  <g opacity="0.08" stroke="#22d3ee" stroke-width="0.5">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>

  <g transform="translate(180 180)">
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="16s" repeatCount="indefinite" additive="sum"/>
    <g fill="none" stroke-width="3.5" stroke-linecap="round">
      <path d="M -68 -110 C -68 -45, 68 -22, 68 42 S -68 110, -68 175" transform="translate(0 -32)" stroke="url(#strandA)"/>
      <path d="M 68 -110 C 68 -45, -68 -22, -68 42 S 68 110, 68 175" transform="translate(0 -32)" stroke="url(#strandB)"/>
    </g>
    <g stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" opacity="0.9">
      <line x1="-52" y1="-110" x2="52" y2="-110"/>
      <line x1="-30" y1="-82"  x2="30" y2="-82"/>
      <line x1="-10" y1="-54"  x2="10" y2="-54"/>
      <line x1="-10" y1="-22"  x2="10" y2="-22"/>
      <line x1="-30" y1="6"    x2="30" y2="6"/>
      <line x1="-52" y1="36"   x2="52" y2="36"/>
      <line x1="-30" y1="64"   x2="30" y2="64"/>
      <line x1="-10" y1="92"   x2="10" y2="92"/>
    </g>
    <g fill="#67e8f9">
      <circle cx="-52" cy="-110" r="3.5"/>
      <circle cx="52"  cy="-110" r="3.5"/>
      <circle cx="-52" cy="36"   r="3.5"/>
      <circle cx="52"  cy="36"   r="3.5"/>
    </g>
  </g>

  <g transform="translate(380 130)" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text font-size="76" font-weight="800" fill="url(#title)" letter-spacing="-2">PsychGeno</text>
    <text y="48" font-size="22" font-weight="500" fill="#94a3b8" letter-spacing="0.5">Privacy-first psychiatric genomics, on your own GPU</text>

    <g transform="translate(0 100)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#cbd5e1">
      <rect x="0"   y="0"  width="160" height="32" rx="6" fill="#0e1a2b" stroke="#1e3a5f"/>
      <text x="14"  y="21">Gemma 4 E4B-it</text>
      <rect x="172" y="0"  width="148" height="32" rx="6" fill="#0e1a2b" stroke="#1e3a5f"/>
      <text x="186" y="21">Unsloth QLoRA</text>
      <rect x="332" y="0"  width="120" height="32" rx="6" fill="#0e1a2b" stroke="#1e3a5f"/>
      <text x="346" y="21">GGUF q4_k_m</text>
      <rect x="464" y="0"  width="92"  height="32" rx="6" fill="#0e1a2b" stroke="#1e3a5f"/>
      <text x="478" y="21">Ollama</text>
      <rect x="568" y="0"  width="116" height="32" rx="6" fill="#0e1a2b" stroke="#1e3a5f"/>
      <text x="582" y="21">FastAPI · 3.12</text>
      <rect x="696" y="0"  width="100" height="32" rx="6" fill="#0e1a2b" stroke="#1e3a5f"/>
      <text x="710" y="21">React 19</text>
    </g>

    <g transform="translate(0 162)" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#64748b">
      <text>12 disorders · 6 DNA formats · 140+ languages · zero cloud · single GPU</text>
    </g>
  </g>

  <g fill="#22d3ee">
    <circle cx="80"   cy="60"  r="1.6"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s"   repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="80"  r="1.4"><animate attributeName="opacity" values="1;0.2;1"   dur="4s"   repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="290" r="1.6"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="60"   cy="320" r="1.3"><animate attributeName="opacity" values="1;0.3;1"   dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="900"  cy="40"  r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
  </g>
</svg>
