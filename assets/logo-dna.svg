<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="220" height="220" role="img" aria-label="PsychGeno DNA helix logo">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#0891b2" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strand1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="strand2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <circle cx="110" cy="110" r="105" fill="url(#bgGlow)"/>

  <g transform="translate(110 110)">
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="14s" repeatCount="indefinite" additive="sum"/>

    <g fill="none" stroke-width="3" stroke-linecap="round" filter="url(#soft)">
      <path d="M -52 -78 C -52 -32, 52 -16, 52 30 S -52 78, -52 124" transform="translate(0 -23)" stroke="url(#strand1)"/>
      <path d="M 52 -78 C 52 -32, -52 -16, -52 30 S 52 78, 52 124" transform="translate(0 -23)" stroke="url(#strand2)"/>
    </g>

    <g stroke="#22d3ee" stroke-width="2" stroke-linecap="round" opacity="0.95">
      <line x1="-40" y1="-78" x2="40" y2="-78"/>
      <line x1="-22" y1="-58" x2="22" y2="-58"/>
      <line x1="-8"  y1="-38" x2="8"  y2="-38"/>
      <line x1="-8"  y1="-14" x2="8"  y2="-14"/>
      <line x1="-22" y1="6"   x2="22" y2="6"/>
      <line x1="-40" y1="26"  x2="40" y2="26"/>
      <line x1="-22" y1="46"  x2="22" y2="46"/>
      <line x1="-8"  y1="66"  x2="8"  y2="66"/>
    </g>

    <g fill="#67e8f9">
      <circle cx="-40" cy="-78" r="3.2"/>
      <circle cx="40"  cy="-78" r="3.2"/>
      <circle cx="-22" cy="-58" r="2.6"/>
      <circle cx="22"  cy="-58" r="2.6"/>
      <circle cx="-22" cy="6"   r="2.6"/>
      <circle cx="22"  cy="6"   r="2.6"/>
      <circle cx="-40" cy="26"  r="3.2"/>
      <circle cx="40"  cy="26"  r="3.2"/>
    </g>
  </g>

  <g fill="#22d3ee" opacity="0.7">
    <circle cx="20" cy="40" r="1.5">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="60" r="1.2">
      <animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="180" r="1.5">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="195" cy="170" r="1.3">
      <animate attributeName="opacity" values="1;0.3;1" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
