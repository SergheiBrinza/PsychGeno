<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" width="1200" height="460" role="img" aria-label="Eight-layer safety stack">
  <defs>
    <linearGradient id="bgS" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0a1626"/>
    </linearGradient>
    <linearGradient id="layerA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0e1a2b"/>
      <stop offset="100%" stop-color="#0a1421"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="460" fill="url(#bgS)"/>

  <text x="40" y="48" font-family="ui-sans-serif, sans-serif" font-size="22" font-weight="700" fill="#e2e8f0">Safety stack</text>
  <text x="40" y="74" font-family="ui-sans-serif, sans-serif" font-size="13" fill="#64748b">Each layer fires independently. If any one of them blocks, the user never reaches a result.</text>

  <g font-family="ui-sans-serif, sans-serif">
    <g transform="translate(40 110)">
      <rect width="270" height="140" rx="10" fill="url(#layerA)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#22d3ee" letter-spacing="1">LAYER 1</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#f1f5f9">Consent flow</text>
      <text x="18" y="82"  font-size="12" fill="#94a3b8">3 steps · 5 acknowledgements</text>
      <text x="18" y="100" font-size="12" fill="#94a3b8">18+ verification</text>
      <text x="18" y="118" font-size="12" fill="#94a3b8">decision in localStorage</text>
    </g>

    <g transform="translate(330 110)">
      <rect width="270" height="140" rx="10" fill="url(#layerA)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#22d3ee" letter-spacing="1">LAYER 2</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#f1f5f9">Cooldown screen</text>
      <text x="18" y="82"  font-size="12" fill="#94a3b8">10 s reflective pause</text>
      <text x="18" y="100" font-size="12" fill="#94a3b8">3 grounding reminders</text>
      <text x="18" y="118" font-size="12" fill="#94a3b8">first-reveal only</text>
    </g>

    <g transform="translate(620 110)">
      <rect width="270" height="140" rx="10" fill="url(#layerA)" stroke="#f87171" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#fca5a5" letter-spacing="1">LAYER 3</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#fef2f2">Crisis hotline</text>
      <text x="18" y="82"  font-size="12" fill="#fecaca">RU 8-800-2000-122</text>
      <text x="18" y="100" font-size="12" fill="#fecaca">DE 0800-1110111</text>
      <text x="18" y="118" font-size="12" fill="#fecaca">US 988</text>
    </g>

    <g transform="translate(910 110)">
      <rect width="250" height="140" rx="10" fill="url(#layerA)" stroke="#a855f7" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#d8b4fe" letter-spacing="1">LAYER 4</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#faf5ff">Disclaimers in weights</text>
      <text x="18" y="82"  font-size="12" fill="#e9d5ff">every training pair carries</text>
      <text x="18" y="100" font-size="12" fill="#e9d5ff">"not a diagnosis"</text>
      <text x="18" y="118" font-size="12" fill="#e9d5ff">prompt-engineering resistant</text>
    </g>

    <g transform="translate(40 270)">
      <rect width="270" height="140" rx="10" fill="url(#layerA)" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#22d3ee" letter-spacing="1">LAYER 5</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#f1f5f9">No absolute risk</text>
      <text x="18" y="82"  font-size="12" fill="#94a3b8">model talks percentiles only</text>
      <text x="18" y="100" font-size="12" fill="#94a3b8">refuses probability of disease</text>
      <text x="18" y="118" font-size="12" fill="#94a3b8">enforced in 8-rule prompt</text>
    </g>

    <g transform="translate(330 270)">
      <rect width="270" height="140" rx="10" fill="url(#layerA)" stroke="#22c55e" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#86efac" letter-spacing="1">LAYER 6</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#f0fdf4">Auto-deletion</text>
      <text x="18" y="82"  font-size="12" fill="#bbf7d0">session TTL 60 min</text>
      <text x="18" y="100" font-size="12" fill="#bbf7d0">background sweep every 60 s</text>
      <text x="18" y="118" font-size="12" fill="#bbf7d0">rate limit 3 uploads / IP</text>
    </g>

    <g transform="translate(620 270)">
      <rect width="270" height="140" rx="10" fill="url(#layerA)" stroke="#fb923c" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#fdba74" letter-spacing="1">LAYER 7</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#fff7ed">PDF watermark</text>
      <text x="18" y="82"  font-size="12" fill="#fed7aa">rotated "EDUCATIONAL ONLY"</text>
      <text x="18" y="100" font-size="12" fill="#fed7aa">CC-BY-4.0 footer per page</text>
      <text x="18" y="118" font-size="12" fill="#fed7aa">survives screenshots</text>
    </g>

    <g transform="translate(910 270)">
      <rect width="250" height="140" rx="10" fill="url(#layerA)" stroke="#facc15" stroke-width="1.5"/>
      <text x="18" y="30" font-size="11" font-family="ui-monospace, monospace" fill="#fde047" letter-spacing="1">LAYER 8</text>
      <text x="18" y="58" font-size="15" font-weight="700" fill="#fefce8">Ancestry-bias warning</text>
      <text x="18" y="82"  font-size="12" fill="#fef08a">European GWAS dominant</text>
      <text x="18" y="100" font-size="12" fill="#fef08a">flagged on About + consent</text>
      <text x="18" y="118" font-size="12" fill="#fef08a">honest about limits</text>
    </g>
  </g>
</svg>
